steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/talentgeo-frontend', '.']
    dir: 'frontend'

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/talentgeo-frontend']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - talentgeo-frontend
      - --image=gcr.io/$PROJECT_ID/talentgeo-frontend
      - --region=us-central1
      - --platform=managed
      - --allow-unauthenticated
      - --memory=256Mi

options:
  logging: CLOUD_LOGGING_ONLY
